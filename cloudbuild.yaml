steps:
  # Step 1: Install backend dependencies
  - name: 'node:22-alpine'
    entrypoint: 'npm'
    args: ['install']
    dir: 'backend'

  # Step 2: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/equa-backend', '.']
    dir: 'backend'

  # Step 3: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/equa-backend']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'equa-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/equa-backend'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'

images:
  - 'gcr.io/$PROJECT_ID/equa-backend'
